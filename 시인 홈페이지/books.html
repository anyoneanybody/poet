<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시집 — 김고니</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #251040;
      color: rgba(235, 200, 215, 0.88);
      font-family: 'Nanum Myeongjo', serif;
      min-height: 100vh;
    }

    /* ── 헤더 ── */

    /* ── 서브페이지 헤더 nav ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      background: rgba(37,16,64,1);
      border-bottom: 1px solid rgba(210, 160, 185, 0.1);
    }

    .header-home {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.45em;
      color: rgba(255, 242, 225, 0.95);
      text-decoration: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      transition: color 0.3s;
      writing-mode: horizontal-tb;
      white-space: nowrap;
    }
    .header-home:hover { color: rgba(255, 240, 225, 1); }

    .header-nav {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .header-nav a {
      color: rgba(210, 180, 200, 0.6);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      font-family: 'Nanum Myeongjo', serif;
      transition: color 0.3s;
      writing-mode: horizontal-tb;
      white-space: nowrap;
    }
    .header-nav a:hover,
    .header-nav a.active {
      color: rgba(255, 240, 225, 0.97);
    }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .header-nav { gap: 14px; }
      .header-nav a { font-size: 0.72rem; }
      .header-home { font-size: 0.85rem; letter-spacing: 0.3em; }
    }

    /* ── 본문 ── */
    main {
      padding: 120px 40px 100px;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── 섹션 제목 ── */
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      color: rgba(225, 185, 205, 0.85);
      margin-bottom: 40px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(210, 160, 185, 0.15);
    }

    .section + .section {
      margin-top: 80px;
    }

    /* ── 책 그리드 ── */
    .book-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px 56px;
    }

    .book-item {
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .book-cover-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 135%;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      transform: perspective(600px) rotateY(0deg);
      transform-style: preserve-3d;
      transition: transform 0.5s ease, box-shadow 0.5s ease;
      box-shadow: none;
    }

    .book-cover-wrap::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 22px;
      height: 100%;
      z-index: 2;
      background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.12) 65%, transparent 100%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .book-cover-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .book-item:hover .book-cover-wrap {
      transform: perspective(600px) rotateY(-10deg);
      box-shadow:
        10px 12px 28px rgba(0,0,0,0.65),
        -2px 2px 6px rgba(0,0,0,0.4);
    }

    .book-item:hover .book-cover-wrap::before {
      opacity: 1;
    }

    /* 호버 시 오버레이 */


    /* 이미지 없을 때 플레이스홀더 */
    .book-cover-wrap img.error {
      display: none;
    }
    .book-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(210,170,190,0.15);
      font-size: 0.75rem;
      color: rgba(210,170,190,0.35);
      letter-spacing: 0.1em;
      text-align: center;
      padding: 16px;
    }

    .book-info {
      margin-top: 14px;
    }

    .book-year {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: rgba(205, 165, 185, 0.4);
      margin-bottom: 5px;
    }

    .book-title {
      font-size: 0.9rem;
      line-height: 1.6;
      color: rgba(235, 200, 215, 0.85);
      letter-spacing: 0.05em;
      font-weight: 400;
      transition: color 0.3s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .book-item:hover .book-title {
      color: rgba(240, 245, 255, 0.97);
    }

    /* ── 하단 여백 장식 ── */
    .footer-line {
      margin: 80px auto 0;
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, rgba(210,160,185,0.25), transparent);
    }

    /* ── 별 배경 ── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur, 10s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%   { opacity: var(--min-op, 0.05); }
      30%  { opacity: var(--mid-op, 0.2); }
      55%  { opacity: var(--min-op, 0.05); }
      80%  { opacity: var(--max-op, 0.3); }
      100% { opacity: var(--min-op, 0.05); }
    }

    /* 모바일 */
    @media (max-width: 480px) {
      main { padding: 100px 24px 80px; }
      .back-btn { left: 24px; }
      .book-grid { gap: 28px 20px; }
      .book-title { white-space: normal; overflow: visible; text-overflow: clip; }
    }

    /* ── 안개 레이어 ── */
    .fog-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .fog-layer {
      position: absolute;
      width: 200%; height: 200%;
      top: -50%; left: -50%;
      background: radial-gradient(ellipse at center,
        rgba(200, 150, 180, 0.07) 0%, transparent 60%);
      animation: fogDrift 20s ease-in-out infinite alternate;
    }
    .fog-layer:nth-child(2) {
      background: radial-gradient(ellipse at 30% 70%,
        rgba(180, 130, 170, 0.06) 0%, transparent 50%);
      animation: fogDrift2 28s ease-in-out infinite alternate;
    }
    .fog-layer:nth-child(3) {
      background: radial-gradient(ellipse at 70% 30%,
        rgba(220, 170, 190, 0.05) 0%, transparent 55%);
      animation: fogDrift3 35s ease-in-out infinite alternate;
    }
    @keyframes fogDrift  { 0% { transform: translate(0,0) scale(1); }     100% { transform: translate(3%,4%) scale(1.05); } }
    @keyframes fogDrift2 { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(-4%,2%) rotate(3deg); } }
    @keyframes fogDrift3 { 0% { transform: translate(0,0) scale(1.05); }  100% { transform: translate(5%,-3%) scale(1); } }

    /* ── 안개 파티클 캔버스 ── */
    #fogCanvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>


  <!-- 안개 레이어 -->
  <div class="fog-container">
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
  </div>
  <!-- 안개 파티클 캔버스 -->
  <canvas id="fogCanvas"></canvas>
  <div class="stars" id="stars"></div>

  <header>
    <a class="header-home" href="index.html">김고니</a>
    <nav class="header-nav">
      <a href="index.html">메인</a>
      <a href="books.html" class="active">시집</a>
      <a href="about.html">작가소개</a>
      <a href="contact.html">연락</a>
    </nav>
  </header>

  <main>

    <!-- 시집 섹션 -->
    <section class="section">
      <div class="section-title">시 집</div>
      <div class="book-grid" id="sijip-grid"></div>
    </section>

    <!-- 동시집 섹션 -->
    <section class="section">
      <div class="section-title">동 시 집</div>
      <div class="book-grid" id="dongsijip-grid"></div>
    </section>

    <div class="footer-line"></div>
  </main>

  <script>
    // ── 별 생성 ──
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 1.8 + 0.4;
      const minOp = 0.02 + Math.random() * 0.06;
      const maxOp = minOp + 0.15 + Math.random() * 0.3;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        --dur:${9 + Math.random()*16}s;
        --delay:${-Math.random()*20}s;
        --min-op:${minOp.toFixed(3)};
        --mid-op:${(minOp + (maxOp-minOp)*0.5).toFixed(3)};
        --max-op:${maxOp.toFixed(3)};
      `;
      starsEl.appendChild(s);
    }

    // ── 안개 파티클 캔버스 ──
    const fogCanvas = document.getElementById('fogCanvas');
    const fogCtx = fogCanvas.getContext('2d');
    function resizeFog() { fogCanvas.width = window.innerWidth; fogCanvas.height = window.innerHeight; }
    resizeFog();
    window.addEventListener('resize', resizeFog);

    const NUM_FOG = 50;
    const fogParticles = Array.from({ length: NUM_FOG }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: 80 + Math.random() * 180,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.12,
      a: 0.01 + Math.random() * 0.03,
      phase: Math.random() * Math.PI * 2,
    }));

    function drawFog(t) {
      fogCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
      for (const p of fogParticles) {
        const pulse = Math.sin(t * 0.0006 + p.phase) * 0.012;
        const grad = fogCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        grad.addColorStop(0,   `rgba(200,155,175,${p.a + pulse})`);
        grad.addColorStop(0.5, `rgba(175,135,160,${(p.a + pulse) * 0.4})`);
        grad.addColorStop(1,   'rgba(0,0,0,0)');
        fogCtx.fillStyle = grad;
        fogCtx.beginPath();
        fogCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fogCtx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.x < -p.r) p.x = fogCanvas.width + p.r;
        if (p.x > fogCanvas.width + p.r) p.x = -p.r;
        if (p.y < -p.r) p.y = fogCanvas.height + p.r;
        if (p.y > fogCanvas.height + p.r) p.y = -p.r;
      }
    }

    // ── 별똥별 ──
    const shootingCanvas = document.createElement('canvas');
    shootingCanvas.style.cssText = 'position:fixed;inset:0;z-index:1;pointer-events:none;';
    document.body.appendChild(shootingCanvas);
    const sc = shootingCanvas.getContext('2d');
    function resizeShooting() { shootingCanvas.width = window.innerWidth; shootingCanvas.height = window.innerHeight; }
    resizeShooting();
    window.addEventListener('resize', resizeShooting);

    const shootingStars = [];
    function spawnShootingStar() {
      const w = window.innerWidth, h = window.innerHeight;
      const angle = (30 + Math.random() * 25) * Math.PI / 180;
      shootingStars.push({
        x: Math.random() * w * 0.9,
        y: Math.random() * h * 0.35,
        vx: Math.cos(angle) * (3.5 + Math.random() * 2),
        vy: Math.sin(angle) * (3.5 + Math.random() * 2),
        length: 90 + Math.random() * 120,
        life: 0,
        maxLife: 55 + Math.random() * 30,
      });
    }
    spawnShootingStar();
    setInterval(spawnShootingStar, 5000);

    function drawShootingStars() {
      sc.clearRect(0, 0, shootingCanvas.width, shootingCanvas.height);
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const s = shootingStars[i];
        s.life++; s.x += s.vx; s.y += s.vy;
        const progress = s.life / s.maxLife;
        const alpha = progress < 0.2 ? progress / 0.2 : progress > 0.7 ? (1 - progress) / 0.3 : 1;
        const len = s.length / Math.hypot(s.vx, s.vy);
        const tailX = s.x - s.vx * len, tailY = s.y - s.vy * len;
        const grad = sc.createLinearGradient(tailX, tailY, s.x, s.y);
        grad.addColorStop(0,   'rgba(255,210,190,0)');
        grad.addColorStop(0.6, `rgba(240,200,180,${(alpha*0.35).toFixed(3)})`);
        grad.addColorStop(1,   `rgba(255,235,215,${(alpha*0.75).toFixed(3)})`);
        sc.beginPath(); sc.moveTo(tailX, tailY); sc.lineTo(s.x, s.y);
        sc.strokeStyle = grad; sc.lineWidth = 0.8 + Math.random() * 0.4; sc.stroke();
        sc.beginPath(); sc.arc(s.x, s.y, 1.2, 0, Math.PI*2);
        sc.fillStyle = `rgba(255,235,215,${(alpha*0.6).toFixed(3)})`; sc.fill();
        if (s.life >= s.maxLife) shootingStars.splice(i, 1);
      }
    }

    // ── 애니메이션 루프 ──
    function bgAnimate(t) {
      requestAnimationFrame(bgAnimate);
      drawFog(t);
      drawShootingStars();
    }
    requestAnimationFrame(bgAnimate);

    // ── 책 데이터 ──
    const sijip = [
      { year: '2025', title: '그녀는 빨간 신호등을 보고 있다',       url: 'https://product.kyobobook.co.kr/detail/S000217089491', img: 'images/1.jpg' },
      { year: '2023', title: '아픈 손으로 문을 여는 사람들에게',      url: 'https://product.kyobobook.co.kr/detail/S000211468809', img: 'images/2.jpg' },
      { year: '2021', title: '아무도 손대지 않은 아침을 너에게 줄게', url: 'https://product.kyobobook.co.kr/detail/S000001953788', img: 'images/104820253.jpg' },
      { year: '2019', title: '팔랑,',                                  url: 'https://product.kyobobook.co.kr/detail/S000001812659', img: 'images/78523940.jpg' },
      { year: '2017', title: '냉장고를 먹는 기린',                     url: 'https://product.kyobobook.co.kr/detail/S000001768900', img: 'images/43945736.jpg' },
      { year: '2016', title: '달의 발자국',                            url: 'https://product.kyobobook.co.kr/detail/S000001768843', img: 'images/33391742.jpg' },
    ];

    const dongsijip = [
      { year: '2025', title: '고슴도치의 고백',  url: 'https://product.kyobobook.co.kr/detail/S000217288650', img: 'images/151249959.jpg' },
      { year: '2022', title: '꽃잎 먹는 달팽이', url: 'https://product.kyobobook.co.kr/detail/S000200373098', img: 'images/115837807.jpg' },
      { year: '2020', title: '완이의 잠꼬대',    url: 'https://product.kyobobook.co.kr/detail/S000001932350', img: 'images/92786566.jpg' },
    ];

    function buildGrid(books, gridId) {
      const grid = document.getElementById(gridId);
      books.forEach(book => {
        const url = book.url;

        const a = document.createElement('a');
        a.className = 'book-item';
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        const wrap = document.createElement('div');
        wrap.className = 'book-cover-wrap';

        if (book.img) {
          const img = document.createElement('img');
          img.src = book.img;
          img.alt = book.title;
          img.onerror = function() {
            this.classList.add('error');
            const ph = document.createElement('div');
            ph.className = 'book-placeholder';
            ph.textContent = book.title;
            wrap.appendChild(ph);
          };
          wrap.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.className = 'book-placeholder';
          ph.textContent = book.title;
          wrap.appendChild(ph);
        }

        const info = document.createElement('div');
        info.className = 'book-info';
        info.innerHTML = `
          <div class="book-year">${book.year}</div>
          <div class="book-title">『${book.title.replace(/\n/g, '<br>')}』</div>
        `;

        a.appendChild(wrap);
        a.appendChild(info);
        grid.appendChild(a);
      });
    }

    buildGrid(sijip, 'sijip-grid');
    buildGrid(dongsijip, 'dongsijip-grid');
  </script>
</body>
</html>
