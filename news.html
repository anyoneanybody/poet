<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소식 — 김고니</title>
  <meta name="description" content="시인 김고니의 새로운 소식. 다가오는 강연, 행사, 출간 소식을 전합니다.">
  <meta name="author" content="김고니">
  <link rel="canonical" href="https://goni.ink/news.html">
  <link rel="icon" href="book_frame.svg" type="image/svg+xml">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="김고니 시인">
  <meta property="og:title" content="소식 — 김고니">
  <meta property="og:description" content="시인 김고니의 새로운 소식. 다가오는 강연, 행사, 출간 소식을 전합니다.">
  <meta property="og:url" content="https://goni.ink/news.html">
  <meta property="og:image" content="https://goni.ink/og-image.jpg">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #251040;
      color: rgba(235, 200, 215, 0.88);
      font-family: 'Nanum Myeongjo', serif;
      min-height: 100vh;
    }

    /* 별 */
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur, 10s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%   { opacity: var(--min-op, 0.05); }
      30%  { opacity: var(--mid-op, 0.2); }
      55%  { opacity: var(--min-op, 0.05); }
      80%  { opacity: var(--max-op, 0.3); }
      100% { opacity: var(--min-op, 0.05); }
    }

    /* 헤더 nav */
    /* ── 서브페이지 헤더 nav ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      background: rgba(37,16,64,1);
      border-bottom: 1px solid rgba(210, 160, 185, 0.1);
    }

    .header-home {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.45em;
      color: rgba(255, 242, 225, 0.95);
      text-decoration: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      transition: color 0.3s;
      writing-mode: horizontal-tb;
      white-space: nowrap;
    }
    .header-home:hover { color: rgba(255, 240, 225, 1); }

    .header-nav {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .header-nav a {
      color: rgba(210, 180, 200, 0.6);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      font-family: 'Nanum Myeongjo', serif;
      transition: color 0.3s;
      writing-mode: horizontal-tb;
      white-space: nowrap;
    }
    .header-nav a:hover,
    .header-nav a.active {
      color: rgba(255, 240, 225, 0.97);
    }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .header-nav { gap: 14px; }
      .header-nav a { font-size: 0.72rem; }
      .header-home { font-size: 0.85rem; letter-spacing: 0.3em; }
    }

    /* 본문 */
    main {
      position: relative;
      z-index: 1;
      padding: 120px 40px 120px;
      max-width: 840px;
      margin: 0 auto;
    }

    /* 섹션 타이틀 */
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      color: rgba(225, 185, 205, 0.85);
      margin-bottom: 48px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(210, 160, 185, 0.15);
    }


    /* 작가 소개 바이오 */
    .bio-section {
      margin-bottom: 80px;
      padding-bottom: 60px;
      border-bottom: 1px solid rgba(210, 160, 185, 0.15);
    }

    .bio-name {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.45em;
      color: rgba(255, 242, 225, 0.95);
      margin-bottom: 28px;
    }

    .bio-text + .bio-text { margin-top: 18px; }

    .bio-text {
      font-size: 0.97rem;
      line-height: 2.2;
      color: rgba(235, 205, 220, 0.82);
      letter-spacing: 0.04em;
      word-break: keep-all;
    }

    .section + .section { margin-top: 90px; }

    /* 연도별 활동 행 */
    .activity-list { display: flex; flex-direction: column; gap: 0; }

    .activity-row {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 0 28px;
      padding: 22px 0;
      border-bottom: 1px solid rgba(210, 160, 185, 0.08);
    }
    .activity-row:first-child { border-top: 1px solid rgba(210, 160, 185, 0.08); }

    .activity-year {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: rgba(205, 165, 185, 0.55);
      padding-top: 3px;
      flex-shrink: 0;
    }

    .activity-content {
      font-size: 0.97rem;
      line-height: 2.0;
      color: rgba(235, 205, 220, 0.82);
      letter-spacing: 0.03em;
      word-break: keep-all;
    }

    .compact .activity-row { padding: 12px 0; }

    .article-link {
      font-size: 0.78rem;
      color: rgba(210, 180, 200, 0.55);
      text-decoration: none;
      border-bottom: 1px solid rgba(210, 160, 185, 0.25);
      margin-left: 8px;
      white-space: nowrap;
      transition: color 0.3s;
    }
    .article-link:hover { color: rgba(255, 240, 225, 0.9); }

    .activity-item {
      display: block;
      position: relative;
      padding-left: 16px;
    }
    .activity-item::before {
      content: '·';
      position: absolute;
      left: 2px;
      color: rgba(210, 175, 200, 0.5);
    }

    .activity-content strong {
      color: rgba(255, 235, 220, 0.97);
      font-weight: 700;
    }

    /* activity-body: content + photo를 하나의 열로 묶음 */
    .activity-body {
      display: flex;
      flex-direction: column;
    }

    /* 사진 슬롯 */
    .photo-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
      margin-bottom: 8px;
    }
    .photo-slot {
      width: 180px;
      height: 130px;
      background: rgba(255,255,255,0.02);
      border: 1px dashed rgba(210,160,185,0.2);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .photo-slot img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* 정기강의 리스트 */
    .lecture-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .lecture-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 0 28px;
      padding: 18px 0;
      border-bottom: 1px solid rgba(210, 160, 185, 0.08);
    }
    .lecture-row:first-child { border-top: 1px solid rgba(210, 160, 185, 0.08); }

    .lecture-period {
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: rgba(205, 165, 185, 0.5);
      padding-top: 3px;
    }

    .lecture-content {
      font-size: 0.95rem;
      line-height: 1.9;
      color: rgba(235, 205, 220, 0.82);
      letter-spacing: 0.03em;
    }

    /* 소식 항목: 줄 없이 한 묶음 */
    .lecture-row { border-bottom: none !important; border-top: none !important; padding-bottom: 6px; }
    .news-poster { margin-top: 10px; }
    @media (max-width: 640px) {
      .news-poster { margin-left: 0 !important; }
    }

    /* ── 소식 포스터 ── */
    .news-poster {
      margin-top: 28px;
      max-width: 420px;
    }
    .news-poster img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.35);
    }
    .news-poster-placeholder {
      aspect-ratio: 3 / 4;
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed rgba(210, 160, 185, 0.25);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: rgba(210, 175, 195, 0.35);
    }

    /* footer */
    .footer-line {
      margin: 90px auto 0;
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, rgba(210,160,185,0.25), transparent);
    }

    @media (max-width: 480px) {
      main { padding: 100px 24px 80px; }
      .back-btn { left: 24px; }
      .activity-row { grid-template-columns: 44px 1fr; gap: 0 16px; }
      .lecture-row { grid-template-columns: 88px 1fr; gap: 0 16px; }
    }

    /* ── 안개 레이어 ── */
    .fog-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .fog-layer {
      position: absolute;
      width: 200%; height: 200%;
      top: -50%; left: -50%;
      background: radial-gradient(ellipse at center,
        rgba(200, 150, 180, 0.07) 0%, transparent 60%);
      animation: fogDrift 20s ease-in-out infinite alternate;
    }
    .fog-layer:nth-child(2) {
      background: radial-gradient(ellipse at 30% 70%,
        rgba(180, 130, 170, 0.06) 0%, transparent 50%);
      animation: fogDrift2 28s ease-in-out infinite alternate;
    }
    .fog-layer:nth-child(3) {
      background: radial-gradient(ellipse at 70% 30%,
        rgba(220, 170, 190, 0.05) 0%, transparent 55%);
      animation: fogDrift3 35s ease-in-out infinite alternate;
    }
    @keyframes fogDrift  { 0% { transform: translate(0,0) scale(1); }     100% { transform: translate(3%,4%) scale(1.05); } }
    @keyframes fogDrift2 { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(-4%,2%) rotate(3deg); } }
    @keyframes fogDrift3 { 0% { transform: translate(0,0) scale(1.05); }  100% { transform: translate(5%,-3%) scale(1); } }

    /* ── 안개 파티클 캔버스 ── */
    #fogCanvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>


  <!-- 안개 레이어 -->
  <div class="fog-container">
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
  </div>
  <!-- 안개 파티클 캔버스 -->
  <canvas id="fogCanvas"></canvas>
  <div class="stars" id="stars"></div>

  <header>
    <a class="header-home" href="index.html">김고니</a>
    <nav class="header-nav">
      <a href="index.html">메인</a>
      <a href="about.html">작가</a>
      <a href="books.html">시집</a>
      <a href="lectures.html">강의</a>
      <a href="events.html">행사</a>
      <a href="news.html" class="active">소식</a>
      <a href="contact.html">연락</a>
    </nav>
  </header>

  <main>

    <div class="bio-section">
      <h1 class="bio-name">소 식</h1>
      <p class="bio-text">
        다가오는 강연과 행사, 새로운 소식을 전합니다.
      </p>
    </div>

    <section class="section">
      <div class="lecture-list">
        <div class="lecture-row" style="grid-template-columns: 160px 1fr;">
          <div class="lecture-period">2026. 7. 25 ~ 8. 25</div>
          <div class="lecture-content">김고니 시인 10주년 기념 시화전 《그 여름의 향기》<br>스페이스 창공 (KTX 진부역) · 작가와의 만남 7. 25.(토) 오후 2시</div>
        </div>
      </div>

      <div class="news-poster" style="margin-left: 188px;">
        <img src="photos/news/poster-2026-summer.jpg" alt="김고니 시인 10주년 기념 시화전 그 여름의 향기 포스터">
      </div>
    </section>

    <div class="footer-line"></div>

  </main>

  <script>
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 1.8 + 0.4;
      const minOp = 0.02 + Math.random() * 0.06;
      const maxOp = minOp + 0.15 + Math.random() * 0.3;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        --dur:${9 + Math.random()*16}s;
        --delay:${-Math.random()*20}s;
        --min-op:${minOp.toFixed(3)};
        --mid-op:${(minOp + (maxOp-minOp)*0.5).toFixed(3)};
        --max-op:${maxOp.toFixed(3)};
      `;
      starsEl.appendChild(s);
    }

    // ── 안개 파티클 캔버스 ──
    const fogCanvas = document.getElementById('fogCanvas');
    const fogCtx = fogCanvas.getContext('2d');
    function resizeFog() { fogCanvas.width = window.innerWidth; fogCanvas.height = window.innerHeight; }
    resizeFog();
    window.addEventListener('resize', resizeFog);

    const NUM_FOG = 50;
    const fogParticles = Array.from({ length: NUM_FOG }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: 80 + Math.random() * 180,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.12,
      a: 0.01 + Math.random() * 0.03,
      phase: Math.random() * Math.PI * 2,
    }));

    function drawFog(t) {
      fogCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
      for (const p of fogParticles) {
        const pulse = Math.sin(t * 0.0006 + p.phase) * 0.012;
        const grad = fogCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        grad.addColorStop(0,   `rgba(200,155,175,${p.a + pulse})`);
        grad.addColorStop(0.5, `rgba(175,135,160,${(p.a + pulse) * 0.4})`);
        grad.addColorStop(1,   'rgba(0,0,0,0)');
        fogCtx.fillStyle = grad;
        fogCtx.beginPath();
        fogCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fogCtx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.x < -p.r) p.x = fogCanvas.width + p.r;
        if (p.x > fogCanvas.width + p.r) p.x = -p.r;
        if (p.y < -p.r) p.y = fogCanvas.height + p.r;
        if (p.y > fogCanvas.height + p.r) p.y = -p.r;
      }
    }

    // ── 별똥별 ──
    const shootingCanvas = document.createElement('canvas');
    shootingCanvas.style.cssText = 'position:fixed;inset:0;z-index:1;pointer-events:none;';
    document.body.appendChild(shootingCanvas);
    const sc = shootingCanvas.getContext('2d');
    function resizeShooting() { shootingCanvas.width = window.innerWidth; shootingCanvas.height = window.innerHeight; }
    resizeShooting();
    window.addEventListener('resize', resizeShooting);

    const shootingStars = [];
    function spawnShootingStar() {
      const w = window.innerWidth, h = window.innerHeight;
      const angle = (30 + Math.random() * 25) * Math.PI / 180;
      shootingStars.push({
        x: Math.random() * w * 0.9,
        y: Math.random() * h * 0.35,
        vx: Math.cos(angle) * (3.5 + Math.random() * 2),
        vy: Math.sin(angle) * (3.5 + Math.random() * 2),
        length: 90 + Math.random() * 120,
        life: 0,
        maxLife: 55 + Math.random() * 30,
      });
    }
    spawnShootingStar();
    setInterval(spawnShootingStar, 5000);

    function drawShootingStars() {
      sc.clearRect(0, 0, shootingCanvas.width, shootingCanvas.height);
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const s = shootingStars[i];
        s.life++; s.x += s.vx; s.y += s.vy;
        const progress = s.life / s.maxLife;
        const alpha = progress < 0.2 ? progress / 0.2 : progress > 0.7 ? (1 - progress) / 0.3 : 1;
        const len = s.length / Math.hypot(s.vx, s.vy);
        const tailX = s.x - s.vx * len, tailY = s.y - s.vy * len;
        const grad = sc.createLinearGradient(tailX, tailY, s.x, s.y);
        grad.addColorStop(0,   'rgba(255,210,190,0)');
        grad.addColorStop(0.6, `rgba(240,200,180,${(alpha*0.35).toFixed(3)})`);
        grad.addColorStop(1,   `rgba(255,235,215,${(alpha*0.75).toFixed(3)})`);
        sc.beginPath(); sc.moveTo(tailX, tailY); sc.lineTo(s.x, s.y);
        sc.strokeStyle = grad; sc.lineWidth = 0.8 + Math.random() * 0.4; sc.stroke();
        sc.beginPath(); sc.arc(s.x, s.y, 1.2, 0, Math.PI*2);
        sc.fillStyle = `rgba(255,235,215,${(alpha*0.6).toFixed(3)})`; sc.fill();
        if (s.life >= s.maxLife) shootingStars.splice(i, 1);
      }
    }

    // ── 애니메이션 루프 ──
    function bgAnimate(t) {
      requestAnimationFrame(bgAnimate);
      drawFog(t);
      drawShootingStars();
    }
    requestAnimationFrame(bgAnimate);
  </script>

</body>
